<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="网页版中国象棋：人机对战、在线人人对战，支持 5/10/15 分钟加秒计时">
  <title>中国象棋 · 在线对弈</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='46' fill='%23c0392b'/><circle cx='50' cy='50' r='40' fill='%23fdf6e3'/><text x='50' y='68' font-size='52' text-anchor='middle' fill='%23c0392b' font-family='serif' font-weight='bold'>帅</text></svg>">
</head>
<body>
  <div id="app">

    <!-- ===== 主页 ===== -->
    <section id="screen-home" class="screen active">
      <header class="home-header">
        <h1>中国象棋</h1>
        <p class="subtitle">人机对弈 · 在线对战 · 加秒计时</p>
      </header>

      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="ai">人机对战</button>
        <button class="mode-tab" data-mode="pvp">人人对战</button>
      </div>

      <!-- 公共：时间设置 -->
      <div class="option-group">
        <div class="option-label">对局用时（每步 +3 秒）</div>
        <div class="option-row" id="tc-options">
          <button class="opt-btn" data-tc="300000">5 分钟</button>
          <button class="opt-btn active" data-tc="600000">10 分钟</button>
          <button class="opt-btn" data-tc="900000">15 分钟</button>
        </div>
      </div>

      <!-- 人机设置 -->
      <div id="panel-ai" class="mode-panel active">
        <div class="option-group">
          <div class="option-label">难度</div>
          <div class="option-row" id="ai-level-options">
            <button class="opt-btn" data-level="easy">简单</button>
            <button class="opt-btn active" data-level="medium">中等</button>
            <button class="opt-btn" data-level="hard">困难</button>
          </div>
        </div>
        <div class="option-group">
          <div class="option-label">执子</div>
          <div class="option-row" id="ai-side-options">
            <button class="opt-btn active" data-side="r">执红（先手）</button>
            <button class="opt-btn" data-side="b">执黑（后手）</button>
            <button class="opt-btn" data-side="random">随机</button>
          </div>
        </div>
        <button class="primary-btn" id="btn-start-ai">开始对局</button>
      </div>

      <!-- 联机设置 -->
      <div id="panel-pvp" class="mode-panel">
        <button class="primary-btn" id="btn-quick-match">⚡ 快速匹配</button>
        <div class="pvp-divider">或与好友对战</div>
        <button class="secondary-btn" id="btn-create-room">创建房间</button>
        <div class="join-row">
          <input id="input-room-code" type="text" maxlength="6" placeholder="输入房号"
                 autocomplete="off" autocapitalize="characters" spellcheck="false">
          <button class="secondary-btn" id="btn-join-room">加入房间</button>
        </div>
        <div id="pvp-status" class="pvp-status"></div>
        <button class="secondary-btn" id="btn-cancel-match" hidden>取消匹配</button>
      </div>
    </section>

    <!-- ===== 对局页 ===== -->
    <section id="screen-game" class="screen">
      <div class="game-layout">
        <div class="board-column">
          <div class="player-bar" id="bar-top">
            <div class="player-info">
              <span class="player-piece" id="top-piece">将</span>
              <span class="player-name" id="top-name">对手</span>
              <span class="conn-dot" id="top-conn" hidden>已断线</span>
            </div>
            <div class="clock" id="clock-top">--:--</div>
          </div>

          <div class="board-wrap">
            <canvas id="board"></canvas>
            <div class="board-toast" id="board-toast" hidden></div>
          </div>

          <div class="player-bar" id="bar-bottom">
            <div class="player-info">
              <span class="player-piece red" id="bottom-piece">帅</span>
              <span class="player-name" id="bottom-name">我</span>
            </div>
            <div class="clock" id="clock-bottom">--:--</div>
          </div>
        </div>

        <aside class="side-column">
          <div class="game-meta" id="game-meta"></div>
          <div class="room-banner" id="room-banner" hidden>
            房号 <b id="room-code-label"></b>
            <button class="mini-btn" id="btn-copy-code">复制</button>
          </div>
          <div class="status-line" id="status-line">准备中…</div>
          <ol class="move-list" id="move-list"></ol>
          <div class="game-controls">
            <button class="ctrl-btn" id="btn-undo" hidden>悔棋</button>
            <button class="ctrl-btn" id="btn-draw" hidden>求和</button>
            <button class="ctrl-btn danger" id="btn-resign">认输</button>
            <button class="ctrl-btn" id="btn-home">退出对局</button>
          </div>
        </aside>
      </div>

      <!-- 结果遮罩 -->
      <div class="overlay" id="result-overlay" hidden>
        <div class="overlay-card">
          <div class="result-title" id="result-title"></div>
          <div class="result-sub" id="result-sub"></div>
          <div class="overlay-actions">
            <button class="primary-btn" id="btn-rematch">再来一局</button>
            <button class="secondary-btn" id="btn-back-home">返回主页</button>
          </div>
          <div class="rematch-hint" id="rematch-hint" hidden>等待对方同意…</div>
        </div>
      </div>

      <!-- 求和请求遮罩 -->
      <div class="overlay" id="draw-overlay" hidden>
        <div class="overlay-card">
          <div class="result-title">对方求和</div>
          <div class="result-sub">是否同意和棋？</div>
          <div class="overlay-actions">
            <button class="primary-btn" id="btn-draw-accept">同意</button>
            <button class="secondary-btn" id="btn-draw-decline">拒绝</button>
          </div>
        </div>
      </div>
    </section>

  </div>
  <script type="module" src="/js/main.js"></script>
</body>
</html>
